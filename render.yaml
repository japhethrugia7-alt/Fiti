services:
  - type: web
    name: fiti-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
        # Set this yourself in the Render dashboard — this is your /admin login password.
      - key: DATABASE_URL
        value: sqlite:///./fiti.db
        # Swap to a managed Postgres URL for production, e.g.:
        # value: postgresql://user:pass@host:5432/fiti
